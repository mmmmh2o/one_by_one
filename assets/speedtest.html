<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>网速测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
  -webkit-tap-highlight-color: transparent;
}
.dark body, body.dark { background: #121212; color: #e0e0e0; }

/* ── 大圆仪表盘 ───────────────────────── */
.gauge-wrap {
  position: relative;
  width: 220px; height: 220px;
  margin: 16px auto 8px;
}
.gauge-ring {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 6px solid #e0e0e0;
  position: absolute;
}
.dark .gauge-ring { border-color: #333; }
.gauge-ring.progress {
  border-color: transparent;
  border-top-color: #4CAF50;
  border-right-color: #4CAF50;
  transition: border-color .3s;
  animation: spin 1s linear infinite;
  opacity: 0;
}
.gauge-ring.progress.active { opacity: 1; }
@keyframes spin { to { transform: rotate(360deg); } }

.gauge-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.gauge-value {
  font-size: 48px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -1px;
}
.gauge-unit { font-size: 14px; color: #888; margin-top: 2px; }
.gauge-label { font-size: 13px; color: #aaa; margin-top: 4px; }

/* ── 三指标卡片 ───────────────────────── */
.metrics {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 380px;
  margin: 16px 0;
}
.metric-card {
  flex: 1;
  background: #fff;
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.dark .metric-card { background: #1e1e1e; }
.metric-icon { font-size: 20px; margin-bottom: 4px; }
.metric-title { font-size: 11px; color: #888; margin-bottom: 2px; }
.metric-val { font-size: 22px; font-weight: 700; }
.metric-unit { font-size: 11px; color: #888; }
.metric-sub { font-size: 11px; margin-top: 2px; }
.c-download { color: #2196F3; }
.c-upload { color: #9C27B0; }
.c-latency { color: #FF9800; }

/* ── 按钮 ─────────────────────────────── */
.btn {
  width: 100%;
  max-width: 380px;
  height: 52px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s, opacity .2s;
  margin-top: 8px;
}
.btn:active { transform: scale(.97); }
.btn-start {
  background: #4CAF50;
  color: #fff;
}
.btn-start:disabled { opacity: .5; cursor: default; }
.btn-reset {
  background: transparent;
  color: #4CAF50;
  border: 1.5px solid #4CAF50;
  margin-top: 8px;
}

/* ── 状态文本 ─────────────────────────── */
.status {
  font-size: 13px;
  color: #888;
  margin: 10px 0;
  min-height: 20px;
  text-align: center;
}

/* ── 进度条 ───────────────────────────── */
.progress-bar-wrap {
  width: 100%;
  max-width: 380px;
  height: 4px;
  background: #e0e0e0;
  border-radius: 2px;
  overflow: hidden;
  margin: 6px 0;
}
.dark .progress-bar-wrap { background: #333; }
.progress-bar {
  height: 100%;
  width: 0%;
  background: #4CAF50;
  border-radius: 2px;
  transition: width .3s;
}

/* ── 历史 ─────────────────────────────── */
.history {
  width: 100%;
  max-width: 380px;
  margin-top: 20px;
}
.history-title { font-size: 13px; color: #888; margin-bottom: 8px; }
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #e8e8e8;
  font-size: 13px;
}
.dark .history-item { border-color: #2a2a2a; }
.history-time { color: #888; font-size: 12px; }
</style>
</head>
<body>

<!-- 仪表盘 -->
<div class="gauge-wrap">
  <div class="gauge-ring" id="ring"></div>
  <div class="gauge-center">
    <div class="gauge-value" id="mainVal">--</div>
    <div class="gauge-unit" id="mainUnit">Mbps</div>
    <div class="gauge-label" id="mainLabel">点击开始测试</div>
  </div>
</div>

<!-- 进度 -->
<div class="progress-bar-wrap"><div class="progress-bar" id="bar"></div></div>
<div class="status" id="status"></div>

<!-- 三指标 -->
<div class="metrics">
  <div class="metric-card">
    <div class="metric-icon">⬇️</div>
    <div class="metric-title">下载</div>
    <div class="metric-val c-download" id="dlVal">--</div>
    <div class="metric-unit">Mbps</div>
  </div>
  <div class="metric-card">
    <div class="metric-icon">⬆️</div>
    <div class="metric-title">上传</div>
    <div class="metric-val c-upload" id="ulVal">--</div>
    <div class="metric-unit">Mbps</div>
  </div>
  <div class="metric-card">
    <div class="metric-icon">📡</div>
    <div class="metric-title">延迟</div>
    <div class="metric-val c-latency" id="latVal">--</div>
    <div class="metric-unit">ms</div>
    <div class="metric-sub" id="latGrade"></div>
  </div>
</div>

<!-- 按钮 -->
<button class="btn btn-start" id="startBtn" onclick="runTest()">开始测试</button>
<button class="btn btn-reset" id="resetBtn" style="display:none" onclick="reset()">重新测试</button>

<!-- 历史 -->
<div class="history" id="historyWrap" style="display:none">
  <div class="history-title">历史记录</div>
  <div id="historyList"></div>
</div>

<script>
// ── 测试服务器（CDN 文件，下载稳定）─────────────────
const DL_URLS = [
  'https://cdn.cloudflare.steamstatic.com/client/installer/SteamSetup.exe',
  'https://dldir1.qq.com/qqfile/qq/PCQQ9.7.17/QQ9.7.17.29225.exe',
  'https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D%26iid%3D%7B9D2B9A1C-6F1D-4A8B-B3E1-1234567890AB%7D%26lang%3Dzh-CN%26browser%3D4%26usagestats%3D0%26appname%3DGoogle%2520Chrome%26needsadmin%3Dprefers/edgedl/chrome/install/ChromeStandaloneSetup64.exe',
];
// 小文件用于延迟探测
const PING_URL = 'https://www.baidu.com/favicon.ico';

let history = JSON.parse(localStorage.getItem('st_history') || '[]');
let running = false;

// ── 工具函数 ───────────────────────────────────────
function $(id) { return document.getElementById(id); }
function fmtMbps(bps) { return (bps / 1e6).toFixed(2); }
function now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function setStatus(t) { $('status').textContent = t; }
function setMain(val, unit, label) {
  $('mainVal').textContent = val;
  $('mainUnit').textContent = unit;
  $('mainLabel').textContent = label;
}
function setProgress(pct) { $('bar').style.width = pct + '%'; }
function setRing(active) {
  $('ring').classList.toggle('active', active);
}

function latencyGrade(ms) {
  if (ms < 0) return '超时';
  if (ms < 30) return '极快';
  if (ms < 80) return '良好';
  if (ms < 150) return '一般';
  return '较慢';
}

// ── 延迟测试（图片加载计时）────────────────────────
async function testLatency() {
  const t0 = performance.now();
  try {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;
      img.src = PING_URL + '?_t=' + Date.now();
      setTimeout(reject, 8000);
    });
    return Math.round(performance.now() - t0);
  } catch {
    return -1;
  }
}

// ── 下载测试 ─────────────────────────────────────
function testDownload(urlIdx, durationMs) {
  urlIdx = urlIdx || 0;
  durationMs = durationMs || 8000;
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    let totalBytes = 0;
    const t0 = performance.now();
    let finished = false;

    xhr.open('GET', DL_URLS[urlIdx % DL_URLS.length] + '?_=' + Date.now(), true);
    xhr.responseType = 'moz-chunked-arraybuffer'; // Firefox
    // fallback: onprogress with responseText
    if (xhr.responseType !== 'moz-chunked-arraybuffer') {
      xhr.responseType = 'text';
    }

    xhr.onprogress = (e) => {
      if (finished) return;
      totalBytes = e.loaded;
      const elapsed = performance.now() - t0;
      const bps = (totalBytes * 8) / (elapsed / 1000);
      const mbps = (bps / 1e6).toFixed(2);
      setMain(mbps, 'Mbps', '下载中');
      setStatus(`已接收 ${(totalBytes / 1048576).toFixed(1)} MB · ${(elapsed / 1000).toFixed(1)}s`);
      setProgress(Math.min((elapsed / durationMs) * 35, 35));

      if (elapsed >= durationMs) {
        finished = true;
        xhr.abort();
        resolve({ bps: (totalBytes * 8) / (elapsed / 1000), bytes: totalBytes, ms: elapsed });
      }
    };

    xhr.onerror = () => {
      if (!finished) {
        finished = true;
        resolve({ bps: 0, bytes: 0, ms: 0 });
      }
    };

    xhr.onload = () => {
      if (!finished) {
        finished = true;
        const elapsed = performance.now() - t0;
        const bytes = xhr.response.length || totalBytes;
        resolve({ bps: (bytes * 8) / (elapsed / 1000), bytes, ms: elapsed });
      }
    };

    xhr.send();
  });
}

// ── 上传测试（发送随机数据）────────────────────────
function testUpload(durationMs) {
  durationMs = durationMs || 5000;
  return new Promise((resolve) => {
    const payload = new Uint8Array(256 * 1024); // 256 KB chunks
    crypto.getRandomValues(payload);
    const totalChunks = 20;
    let sent = 0;
    const t0 = performance.now();
    let finished = false;

    function sendChunk() {
      if (finished) return;
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://httpbin.org/post', true);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');

      xhr.onload = xhr.onerror = () => {
        if (finished) return;
        sent += payload.length;
        const elapsed = performance.now() - t0;
        const bps = (sent * 8) / (elapsed / 1000);
        setMain((bps / 1e6).toFixed(2), 'Mbps', '上传中');
        setStatus(`已发送 ${(sent / 1048576).toFixed(1)} MB · ${(elapsed / 1000).toFixed(1)}s`);
        setProgress(35 + Math.min((elapsed / durationMs) * 30, 30));

        if (elapsed >= durationMs || sent >= payload.length * totalChunks) {
          finished = true;
          resolve({ bps: (sent * 8) / (elapsed / 1000), bytes: sent, ms: elapsed });
        } else {
          setTimeout(sendChunk, 50);
        }
      };

      xhr.send(payload);
    }

    sendChunk();
  });
}

// ── 主流程 ────────────────────────────────────────
async function runTest() {
  if (running) return;
  running = true;
  $('startBtn').disabled = true;
  $('startBtn').textContent = '测试中…';
  $('resetBtn').style.display = 'none';
  setRing(true);

  let dl = 0, ul = 0, lat = 0;

  try {
    // 延迟
    setProgress(5);
    setStatus('正在测量延迟…');
    lat = await testLatency();
    $('latVal').textContent = lat < 0 ? '超时' : lat;
    $('latGrade').textContent = latencyGrade(lat);

    // 下载
    setProgress(10);
    setStatus('正在测试下载速度…');
    const dlRes = await testDownload(0, 8000);
    dl = dlRes.bps;
    $('dlVal').textContent = fmtMbps(dl);

    // 上传
    setProgress(40);
    setStatus('正在测试上传速度…');
    const ulRes = await testUpload(5000);
    ul = ulRes.bps;
    $('ulVal').textContent = fmtMbps(ul);

    // 完成
    setProgress(100);
    setRing(false);
    setMain(fmtMbps(dl), 'Mbps', '测试完成');
    setStatus('');

    // 保存历史
    const entry = { dl: fmtMbps(dl), ul: fmtMbps(ul), lat, time: now() };
    history.unshift(entry);
    if (history.length > 10) history.pop();
    localStorage.setItem('st_history', JSON.stringify(history));
    renderHistory();
  } catch (e) {
    setStatus('测试出错：' + e.message);
    setRing(false);
  }

  running = false;
  $('startBtn').disabled = false;
  $('startBtn').textContent = '重新测试';
  $('resetBtn').style.display = 'block';
}

function reset() {
  setMain('--', 'Mbps', '点击开始测试');
  $('dlVal').textContent = '--';
  $('ulVal').textContent = '--';
  $('latVal').textContent = '--';
  $('latGrade').textContent = '';
  setProgress(0);
  setStatus('');
  $('startBtn').textContent = '开始测试';
  $('resetBtn').style.display = 'none';
}

function renderHistory() {
  if (!history.length) {
    $('historyWrap').style.display = 'none';
    return;
  }
  $('historyWrap').style.display = 'block';
  $('historyList').innerHTML = history.map(h =>
    `<div class="history-item">
      <span>↓${h.dl} / ↑${h.ul} Mbps</span>
      <span class="history-time">${h.lat}ms · ${h.time}</span>
    </div>`
  ).join('');
}

// ── 暗色模式检测 ──────────────────────────────────
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.body.classList.add('dark');
}

renderHistory();
</script>
</body>
</html>
