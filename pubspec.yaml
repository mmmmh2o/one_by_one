name: toolbox
description: "轻量级多工具集"
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.0.0
  dio: ^5.0.0
  retrofit: ^4.0.0
  google_fonts: ^6.0.0
  flutter_screenutil: ^5.0.0
  shimmer: ^3.0.0
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.0.0
  sensors_plus: ^5.0.0
  image_picker: ^1.0.0
  image: ^4.0.0
  path_provider: ^2.0.0
  share_plus: ^9.0.0
  url_launcher: ^6.0.0
  connectivity_plus: ^6.0.0
  package_info_plus: ^8.0.0
  flutter_tts: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.0.0
  riverpod_generator: ^2.0.0
  hive_generator: ^2.0.0
  mockito: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
